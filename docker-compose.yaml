services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: dock944/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: dock944/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb


  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    image: dock944/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue

  mysql:
   build:
     context: ./mysql
     dockerfile: Dockerfile
   image: dock944/mysql:1.0.0
   container_name: mysql

  shipping:
   build:
     context: ./shipping 
     dockerfile: Dockerfile
   image: dock944/shipping:1.0.0
   container_name: shipping
   depends_on:
    - mysql
    - cart

  payment:
    build: ./payment
    image: dock944/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - cart
    - user




  frontend:
   build:
     context: ./frontend
     dockerfile: Dockerfile
   image: dock944/frontend:1.0.0
   container_name: frontend
   ports:
    - "80:80"
   depends_on: 
    - catalogue
    - user
    - cart
    - shipping
    - payment



  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: dock944/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis 

  rabbitmq:
    image: rabbitmq:3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually