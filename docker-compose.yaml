services:
  catalogue:
    build: 
      context: ./catalogue
      dockerfile: catalogue.Dockerfile 
    image: catalogue:1.0.0  #its equals to docker build -t docks944/mongodb:1.0.0 
    container_name: catalogue
    depends_on: 
    - mongodb


  mongodb:
    build: 
      context: ./mongodb
      dockerfile: mongodb.Dockerfile
    image: mongodb:1.0.0
    container_name: mongodb
    
    
networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if true need to create network manually,false means it will create automatically
          