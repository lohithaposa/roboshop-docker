services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: dock944/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
   build:
     context: ./user
     dockerfile: Dockerfile
   image: dock944/user:1.0.0
   container_name: user
   depends_on: 
    - redis

  cart:
   build:
     context: ./cart
     dockerfile: Dockerfile
   image: dock944/cart:1.0.0
   container_name: cart
   depends_on: 
    - redis

  mysql:
   build:
     context: ./mysql
     dockerfile: Dockerfile
   image: dock944/mysql1.0.0
   container_name: mysql



  frontend:
   build:
     context: ./frontend
     dockerfile: Dockerfile
   image: dock944/frontend:1.0.0
   container_name: frontend
   ports:
    - "80:80"
   depends_on: 
    - catalogue
    - user
    - cart



  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: dock944/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis 

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually